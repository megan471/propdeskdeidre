const USERS = [
  { name:"Tam",    pin:"2026", color:T.sage,   icon:"👩‍💼" },

  {key:"clients",   icon:"🏠", label:"Clients"},
  {key:"contacts",  icon:"📋", label:"Contacts"},
  {key:"commission",icon:"💰", label:"Commission"},
  {key:"tasks",     icon:"✅", label:"Tasks"},

const fmt = n => "R " + Number(n).toLocaleString("en-ZA");
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const el  = (t,s="",h="") => { const e=document.createElement(t); if(s)e.style.cssText=s; if(h)e.innerHTML=h; return e; };
const inp = (t,v,cb) => { const i=el("input",IS); i.type=t; i.value=v||""; i.oninput=e=>cb(e.target.value); return i; };
const sel = (opts,v,cb) => { const s=el("select",IS); opts.forEach(o=>{ const op=document.createElement("option"); op.value=o; op.textContent=o; if(o===v)op.selected=true; s.appendChild(op); }); s.onchange=e=>cb(e.target.value); return s; };
const ta  = (v,cb) => { const t=el("textarea",IS+"height:55px;resize:vertical;"); t.value=v||""; t.oninput=e=>cb(e.target.value); return t; };
const fld = (l,c) => { const w=el("div","margin-bottom:10px"); w.appendChild(el("label",`display:block;font-size:11px;font-weight:600;color:${T.muted};margin-bottom:3px`,l)); w.appendChild(c); return w; };
const empt = t => el("div",`text-align:center;color:${T.muted};padding:24px 0;font-size:12px`,t);
const IS  = `width:100%;border:1.5px solid ${T.border};border-radius:8px;padding:8px 10px;font-size:13px;color:${T.text};outline:none;box-sizing:border-box;background:#FDFAF6;`;
const BS  = c => `background:${c};color:#fff;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:600;font-size:13px`;
const SB  = c => `background:${c}22;color:${c};border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-weight:600;font-size:11px`;

function modal(title,onClose){
  const ov=el("div","position:fixed;inset:0;background:rgba(26,26,26,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px");
  const bx=el("div",`background:#fff;border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);border-top:4px solid ${T.orange}`);
  const hd=el("div","display:flex;justify-content:space-between;align-items:center;margin-bottom:16px");
  hd.appendChild(el("div",`font-weight:800;font-size:16px;color:${T.text}`,title));
  const cl=el("button","background:none;border:none;font-size:18px;cursor:pointer;color:#94A3B8","✕"); cl.onclick=onClose;
  hd.appendChild(cl); bx.appendChild(hd); ov.appendChild(bx); return {ov,bx};
}

let S = {user:null,tab:"dashboard",clients:{},tasks:{},commission:{},events:{},loading:true};
let loginS  = {selected:null,pin:"",error:""};
let clientS = {roleTab:"All",statusTab:"All",showModal:false,editId:null,viewId:null,form:{name:"",cell:"",email:"",address:"",price:"",status:"Current",role:"Buyer",notes:""}};
let commS   = {tab:"Pending",showModal:false,form:{property:"",salePrice:"",commPct:"5.5",splitPct:"60",paid:false}};
let taskS   = {filter:"Pending",showAdd:false,form:{title:"",date:"",priority:"Medium"}};
let calS    = {year:new Date().getFullYear(),month:new Date().getMonth(),showModal:false,editId:null,form:{date:"",time:"09:00",type:"Viewing",address:"",client:"",notes:""}};
let contactSearch = "";

function render(){ const root=document.getElementById("root"); root.innerHTML=""; root.appendChild(S.user?renderApp():renderLogin()); }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  const wrap=el("div",`min-height:100vh;background:linear-gradient(135deg,${T.primary} 0%,#2C2418 60%,${T.sage} 100%);display:flex;align-items:center;justify-content:center`);
  const card=el("div",`background:${T.bg};border-radius:24px;padding:36px 28px;width:90%;max-width:360px;box-shadow:0 30px 80px rgba(0,0,0,0.4);text-align:center;border-top:4px solid ${T.orange}`);
  card.innerHTML=`<div style="font-size:36px">🏡</div><div style="font-weight:800;font-size:22px;color:${T.text};margin:4px 0 2px">PropDesk</div><div style="font-size:12px;color:${T.muted};margin-bottom:24px">Property Agent CRM</div>`;
  if(!loginS.selected){
    card.appendChild(el("div",`font-weight:600;color:${T.text};margin-bottom:16px;font-size:14px`,"Who's logging in?"));
    const row=el("div","display:flex;gap:12px;justify-content:center");
    USERS.forEach(u=>{ const b=el("button",`background:${u.color};color:#fff;border:none;border-radius:14px;padding:18px 28px;cursor:pointer;font-weight:700;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:6px`); b.innerHTML=`<span style="font-size:28px">${u.icon}</span>${u.name}`; b.onclick=()=>{loginS={selected:u,pin:"",error:""};render();}; row.appendChild(b); });
    card.appendChild(row);
  } else {
    const u=loginS.selected;
    const hd=el("div","display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px");
    hd.innerHTML=`<span style="font-size:22px">${u.icon}</span><span style="font-weight:700;font-size:16px;color:${T.text}">Hi, ${u.name}!</span>`;
    const chg=el("button",`background:none;border:none;color:${T.muted};cursor:pointer;font-size:12px;margin-left:4px`,"Change"); chg.onclick=()=>{loginS={selected:null,pin:"",error:""};render();}; hd.appendChild(chg); card.appendChild(hd);
    card.appendChild(el("div",`font-weight:600;color:${T.text};margin-bottom:16px;font-size:13px`,"Enter your 4-digit PIN"));
    const dots=el("div","display:flex;gap:12px;justify-content:center;margin-bottom:20px");
    for(let i=0;i<4;i++) dots.appendChild(el("div",`width:16px;height:16px;border-radius:50%;background:${i<loginS.pin.length?u.color:T.border}`));
    card.appendChild(dots);
    if(loginS.error) card.appendChild(el("div","color:#C0392B;font-size:12px;margin-bottom:12px;font-weight:600",loginS.error));
    const grid=el("div","display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto");
    [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(d=>{
      const b=el("button",`padding:14px 0;border-radius:12px;border:1.5px solid ${T.border};background:${d==="⌫"?"#FDECEA":"#FDFAF6"};color:${d==="⌫"?"#C0392B":T.text};font-weight:700;font-size:18px;cursor:${d===""?"default":"pointer"};opacity:${d===""?0:1}`,String(d));
      b.onclick=()=>{ if(d==="")return; if(d==="⌫"){loginS.pin=loginS.pin.slice(0,-1);loginS.error="";render();return;} if(loginS.pin.length>=4)return; loginS.pin+=d;loginS.error="";render(); if(loginS.pin.length===4)setTimeout(()=>{ if(loginS.pin===u.pin){S.user=u;loginS={selected:null,pin:"",error:""};render();}else{loginS.error="Incorrect PIN. Try again.";loginS.pin="";render();} },200); };
      grid.appendChild(b);
    });
    card.appendChild(grid);
  }
  wrap.appendChild(card); return wrap;
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function renderApp(){
  const wrap=el("div","display:flex;flex-direction:column;min-height:100vh");
  const hdr=el("div",`background:${T.primary};color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between`);
  hdr.innerHTML=`<div><span style="font-weight:800;font-size:17px">🏡 PropDesk</span><span style="font-size:11px;margin-left:8px;color:${T.sage}">Property Agent CRM</span></div>`;
  const badge=el("div",`display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;border:1px solid rgba(255,255,255,0.15)`);
  badge.innerHTML=`<span style="font-size:14px">${S.user.icon}</span><span style="font-size:12px;font-weight:600">${S.user.name}</span>`;
  const lk=el("button",`background:none;border:none;color:${T.orange};cursor:pointer;font-size:11px;margin-left:4px`,"🔒 Lock"); lk.onclick=()=>{S.user=null;render();};
  badge.appendChild(lk); hdr.appendChild(badge);
  const nav=el("div",`background:#fff;border-bottom:2px solid ${T.border};display:flex;overflow-x:auto`);
  NAV.forEach(n=>{ const b=el("button",`padding:11px 13px;border:none;background:none;cursor:pointer;font-weight:600;font-size:12px;white-space:nowrap;color:${S.tab===n.key?T.orange:T.muted};border-bottom:${S.tab===n.key?`3px solid ${T.orange}`:"3px solid transparent"}`,`${n.icon} ${n.label}`); b.onclick=()=>{S.tab=n.key;render();}; nav.appendChild(b); });
  const content=el("div","flex:1;overflow-y:auto;padding:16px");
  if(S.loading){content.innerHTML=`<div style="text-align:center;padding:60px;color:${T.muted}">Loading... ⏳</div>`;}
  else{
    const clients=Object.values(S.clients),tasks=Object.values(S.tasks),commission=Object.values(S.commission),events=Object.values(S.events);
    if(S.tab==="dashboard") content.appendChild(renderDash(clients,tasks,commission,events));
    if(S.tab==="clients")   content.appendChild(renderClients(clients));
    if(S.tab==="contacts")  content.appendChild(renderContacts(clients));
    if(S.tab==="commission")content.appendChild(renderComm(commission));
    if(S.tab==="tasks")     content.appendChild(renderTasks(tasks));
    if(S.tab==="calendar")  content.appendChild(renderCal(events,clients));
  }
  wrap.appendChild(hdr); wrap.appendChild(nav); wrap.appendChild(content); return wrap;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash(clients,tasks,commission,events){
  const w=el("div","display:flex;flex-direction:column;gap:14px");
  const sold=clients.filter(c=>c.status==="Sold"),uo=clients.filter(c=>c.status==="Under Offer"),cur=clients.filter(c=>c.status==="Current"),lost=clients.filter(c=>c.status==="Lost Lead");
  const totG=commission.reduce((a,c)=>a+c.salePrice*c.commPct/100,0),totV=totG*0.21,totN=totG-totV;
  const totP=commission.reduce((a,c)=>{const g=c.salePrice*c.commPct/100,n=g-g*0.21;return a+n*c.splitPct/100;},0);
  const paidP=commission.filter(c=>c.paid).reduce((a,c)=>{const g=c.salePrice*c.commPct/100,n=g-g*0.21;return a+n*c.splitPct/100;},0);
  const cards=el("div","display:flex;gap:10px;flex-wrap:wrap");
  [["🏠","Active",cur.length,T.sage,T.sageL],["🤝","Under Offer",uo.length,T.orange,T.orangeL],["✅","Sold",sold.length,"#3D7A5A","#E8F5EE"],["📉","Lost",lost.length,"#C0392B","#FDECEA"]].forEach(([ic,lb,v,c,bg])=>{ const d=el("div",`background:${bg};border-radius:12px;padding:14px 16px;border-left:4px solid ${c};flex:1;min-width:100px`); d.innerHTML=`<div style="font-size:20px">${ic}</div><div style="font-size:26px;font-weight:800;color:${c}">${v}</div><div style="font-size:11px;color:${T.muted}">${lb}</div>`; cards.appendChild(d); });
  const cb=el("div",`background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border-top:3px solid ${T.sage}`,"");
  cb.innerHTML=`<div style='font-weight:700;color:${T.text};margin-bottom:10px;font-size:14px'>💰 My Commission Summary</div>`;
  [["My Total Take-Home",totP,T.sage],["Received",paidP,"#3D7A5A"],["Pending",totP-paidP,T.orange]].forEach(([l,v,c])=>{ const r=el("div","display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F0E8;font-size:13px"); r.innerHTML=`<span style="color:${T.muted}">${l}</span><span style="font-weight:700;color:${c}">${fmt(v)}</span>`; cb.appendChild(r); });
  const pending=tasks.filter(t=>!t.done);
  const tb=el("div",`background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);flex:1;min-width:180px;border-top:3px solid ${T.orange}`,"");
  tb.innerHTML=`<div style='font-weight:700;color:${T.text};margin-bottom:10px;font-size:14px'>✅ Pending (${pending.length})</div>`;
  if(!pending.length)tb.appendChild(empt("All caught up! 🎉"));
  pending.slice(0,4).forEach(t=>{ const r=el("div","display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #F5F0E8"); r.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${PC[t.priority]};flex-shrink:0"></div><span style="font-size:12px;color:${T.text}">${t.title}</span>`; tb.appendChild(r); });
  const todayStr=new Date().toISOString().split("T")[0];
  const up=events.filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const eb=el("div",`background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);flex:1;min-width:180px;border-top:3px solid ${T.sage}`,"");
  eb.innerHTML=`<div style='font-weight:700;color:${T.text};margin-bottom:10px;font-size:14px'>📅 Upcoming (${up.length})</div>`;
  if(!up.length)eb.appendChild(empt("No upcoming events."));
  up.forEach(e=>{ const r=el("div","padding:5px 0;border-bottom:1px solid #F5F0E8"); r.innerHTML=`<div style="display:flex;align-items:center;gap:5px"><span style="background:${EV[e.type]};color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700">${e.type}</span><span style="font-size:11px;color:${T.muted}">${e.date} ${e.time}</span></div><div style="font-size:12px;font-weight:600;color:${T.text};margin-top:2px">${e.address}</div>`; eb.appendChild(r); });
  const row=el("div","display:flex;gap:12px;flex-wrap:wrap"); row.appendChild(tb); row.appendChild(eb);
  w.appendChild(cards); w.appendChild(cb); w.appendChild(row); return w;
}

// ── CLIENTS ───────────────────────────────────────────────────────────────────
function renderClients(clients){
  const w=el("div");
  const rt=el("div","display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap");
  ["All","Buyer","Seller"].forEach(r=>{ const a=clientS.roleTab===r; const b=el("button",`padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:11px;background:${a?(RC[r]||T.primary):"#EDE8E0"};color:${a?"#fff":T.muted}`,`${r==="Buyer"?"🛒":r==="Seller"?"🏷️":"👥"} ${r}`); b.onclick=()=>{clientS.roleTab=r;render();}; rt.appendChild(b); });
  const st=el("div","display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center");
  ["All",...STATUSES].forEach(s=>{ const a=clientS.statusTab===s; const b=el("button",`padding:5px 11px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:11px;background:${a?(SC[s]?.bg||T.primary):"#EDE8E0"};color:${a?"#fff":T.muted}`,s); b.onclick=()=>{clientS.statusTab=s;render();}; st.appendChild(b); });
  const ab=el("button",BS(T.orange)+";margin-left:auto","+ Add Client"); ab.onclick=()=>{clientS.showModal=true;clientS.editId=null;clientS.form={name:"",cell:"",email:"",address:"",price:"",status:"Current",role:"Buyer",notes:""};render();}; st.appendChild(ab);
  const filtered=clients.filter(c=>(clientS.roleTab==="All"||c.role===clientS.roleTab||c.role==="Both")&&(clientS.statusTab==="All"||c.status===clientS.statusTab));
  const list=el("div","display:flex;flex-direction:column;gap:10px");
  if(!filtered.length)list.appendChild(empt("No clients match this filter."));
  filtered.forEach(c=>{ const card=el("div",`background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border-left:4px solid ${SC[c.status].bg}`); card.innerHTML=`<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px"><div style="font-weight:700;font-size:14px;color:${T.text}">${c.name}</div><div style="display:flex;gap:5px"><span style="background:${RC[c.role]}22;color:${RC[c.role]};font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700">${c.role==="Both"?"🛒🏷️ Both":c.role==="Buyer"?"🛒 Buyer":"🏷️ Seller"}</span><span style="background:${SC[c.status].bg};color:#fff;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700">${c.status}</span></div></div><div style="font-size:12px;color:${T.muted};margin-top:2px">📍 ${c.address}</div><div style="font-weight:800;color:${T.sage};margin-top:3px;font-size:13px">${fmt(c.price)}</div><div style="margin-top:5px;font-size:12px;color:${T.text}">📱 ${c.cell} &nbsp;|&nbsp; ✉️ ${c.email}</div>${c.notes?`<div style="background:${T.bg};border-radius:6px;padding:4px 8px;margin-top:6px;font-size:11px;color:${T.muted}">📝 ${c.notes}</div>`:""}`;
    const br=el("div","display:flex;gap:6px;margin-top:10px");
    const db_=el("button",SB(T.sage),"📁 Docs"); db_.onclick=()=>{clientS.viewId=c.id;render();};
    const eb=el("button",SB(T.orange),"✏️ Edit"); eb.onclick=()=>{clientS.editId=c.id;clientS.form={...c};clientS.showModal=true;render();};
    const dlb=el("button",SB("#C0392B"),"🗑 Delete"); dlb.onclick=()=>{if(confirm(`Delete ${c.name}?`))delDB(`clients/${c.id}`);};
    br.appendChild(db_);br.appendChild(eb);br.appendChild(dlb);card.appendChild(br);list.appendChild(card); });
